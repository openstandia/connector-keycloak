name: Integration test (reusable)

on:
  workflow_call:

jobs:
  test:
    name: Test (Keycloak ${{ matrix.keycloak-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        keycloak-version: ['24.0.5', '26.0.8', '26.6.1']
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: 11
          cache: 'maven'

      - name: Build and integration test
        run: mvn -B verify -Dgpg.skip=true -Dkeycloak.test.version=${{ matrix.keycloak-version }}
